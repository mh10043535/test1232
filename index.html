<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA MOBILE - 공식 인증 프리미엄 샵</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- [채널톡 스크립트 붙여넣기 시작] -->
    <!-- 이곳에 채널톡에서 발급받은 스크립트 전체를 복사해서 붙여넣으세요. -->
  <script>
  (function(){var w=window;if(w.ChannelIO){return w.console.error("ChannelIO script included twice.");}var ch=function(){ch.c(arguments);};ch.q=[];ch.c=function(args){ch.q.push(args);};w.ChannelIO=ch;function l(){if(w.ChannelIOInitialized){return;}w.ChannelIOInitialized=true;var s=document.createElement("script");s.type="text/javascript";s.async=true;s.src="https://cdn.channel.io/plugin/ch-plugin-web.js";var x=document.getElementsByTagName("script")[0];if(x.parentNode){x.parentNode.insertBefore(s,x);}}if(document.readyState==="complete"){l();}else{w.addEventListener("DOMContentLoaded",l);w.addEventListener("load",l);}})();

  ChannelIO('boot', {
    "pluginKey": "e7d7395a-33a7-4e08-92c9-aae4d6549459"
  });
</script>
    <!-- [채널톡 스크립트 붙여넣기 끝] -->

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .gradient-text {
            background: linear-gradient(to r, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .animate-float {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 아이콘 컴포넌트 헬퍼 (Lucide)
        const Icon = ({ name, size = 24, strokeWidth = 2, className = "", fill = "none" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className} stroke-width={strokeWidth} fill={fill}></i>;
        };

        const App = () => {
            const [isScrolled, setIsScrolled] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [timeLeft, setTimeLeft] = useState({ hours: 23, minutes: 59, seconds: 59 });
            const [formData, setFormData] = useState({
                name: '',
                phone: '',
                model: 'Nova 15 Pro',
                type: '번호이동'
            });

            // 타이머 로직
            useEffect(() => {
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev.seconds > 0) return { ...prev, seconds: prev.seconds - 1 };
                        if (prev.minutes > 0) return { ...prev, minutes: prev.minutes - 1, seconds: 59 };
                        if (prev.hours > 0) return { ...prev, hours: prev.hours - 1, minutes: 59, seconds: 59 };
                        return prev;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // 스크롤 감지
            useEffect(() => {
                const handleScroll = () => {
                    setIsScrolled(window.scrollY > 50);
                };
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const handleSubmit = (e) => {
                e.preventDefault();
                // 커스텀 알림창 생성
                const modal = document.createElement('div');
                modal.className = "fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm p-4";
                modal.innerHTML = `
                    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl text-center max-w-sm w-full">
                        <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                        </div>
                        <h3 class="text-2xl font-black mb-3 text-slate-900">\${formData.name}님 접수 완료!</h3>
                        <p class="text-slate-500 mb-8 font-medium leading-relaxed">최적의 지원금 혜택을 준비하여 5분 이내로 전문 상담원이 연락드리겠습니다.</p>
                        <button id="closeModal" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-lg hover:bg-blue-700 transition-all">확인</button>
                    </div>
                `;
                document.body.appendChild(modal);
                document.getElementById('closeModal').onclick = () => {
                    document.body.removeChild(modal);
                };
                setFormData({ name: '', phone: '', model: 'Nova 15 Pro', type: '번호이동' });
            };

            const handleChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const scrollTo = (id) => {
                const el = document.getElementById(id);
                if (el) el.scrollIntoView({ behavior: 'smooth' });
                setIsMenuOpen(false);
            };

            // 채널톡 실시간 상담 호출 함수
            const handleConsultation = () => {
                if (window.ChannelIO) {
                    window.ChannelIO('showMessenger');
                } else {
                    // 채널톡이 로드되지 않았을 경우 하단 상담 신청 폼으로 스크롤
                    scrollTo('consultation');
                }
            };

            return (
                <div className="min-h-screen bg-white text-slate-900 overflow-x-hidden selection:bg-blue-100">
                    {/* 긴급성 상단 배너 */}
                    <div className="bg-slate-900 text-white py-2.5 px-4 text-center text-xs md:text-sm font-bold flex justify-center items-center gap-3">
                        <span className="flex items-center gap-1.5"><Icon name="clock" size={16} className="text-blue-400"/> 이벤트 마감 임박:</span>
                        <span className="bg-blue-600 text-white px-2 py-0.5 rounded tabular-nums font-black">
                            {String(timeLeft.hours).padStart(2, '0')}:{String(timeLeft.minutes).padStart(2, '0')}:{String(timeLeft.seconds).padStart(2, '0')}
                        </span>
                        <span className="hidden sm:inline opacity-70">| 역대급 공시지원금 + 전환 지원금 중복 적용 중</span>
                    </div>

                    {/* Navigation */}
                    <nav className={`fixed w-full z-50 transition-all duration-500 top-10 md:top-10 ${isScrolled ? 'bg-white/90 backdrop-blur-xl shadow-lg py-3' : 'bg-transparent py-6'}`}>
                        <div className="container mx-auto px-6 flex justify-between items-center">
                            <div className="flex items-center gap-2 text-2xl font-black text-blue-600 tracking-tighter">
                                <Icon name="smartphone" strokeWidth={3} />
                                <span>NOVA MOBILE</span>
                            </div>
                            
                            <div className="hidden md:flex items-center gap-10 font-black text-sm text-slate-700">
                                <button onClick={() => scrollTo('features')} className="hover:text-blue-600 transition">특장점</button>
                                <button onClick={() => scrollTo('price')} className="hover:text-blue-600 transition">가격비교</button>
                                <button onClick={() => scrollTo('reviews')} className="hover:text-blue-600 transition">실제후기</button>
                                <button 
                                    onClick={handleConsultation}
                                    className="bg-blue-600 text-white px-8 py-3 rounded-full hover:bg-blue-700 transition-all hover:scale-105 shadow-xl shadow-blue-200"
                                >
                                    무료 견적 받기
                                </button>
                            </div>

                            <button className="md:hidden p-2 text-slate-900" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                                <Icon name={isMenuOpen ? "x" : "menu"} size={28} />
                            </button>
                        </div>
                    </nav>

                    {/* Mobile Menu Overlay */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[60] bg-white flex flex-col items-center justify-center gap-10 text-3xl font-black md:hidden">
                            <button onClick={() => scrollTo('features')}>특장점</button>
                            <button onClick={() => scrollTo('price')}>가격비교</button>
                            <button onClick={() => scrollTo('reviews')}>실제후기</button>
                            <button 
                                className="bg-blue-600 text-white px-12 py-5 rounded-[2rem] shadow-2xl"
                                onClick={handleConsultation}
                            >
                                무료 견적 받기
                            </button>
                            <button className="absolute top-10 right-6 text-slate-400" onClick={() => setIsMenuOpen(false)}>
                                <Icon name="x" size={36} />
                            </button>
                        </div>
                    )}

                    {/* Hero Section */}
                    <section className="relative pt-44 pb-20 md:pt-64 md:pb-48 overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-full -z-10 bg-[radial-gradient(circle_at_70%_30%,#eff6ff_0%,#ffffff_60%)]"></div>
                        <div className="container mx-auto px-6 flex flex-col md:flex-row items-center gap-16">
                            <div className="md:w-3/5 text-center md:text-left z-10">
                                <div className="inline-block px-5 py-2 bg-blue-50 text-blue-700 rounded-full text-sm font-black mb-8 animate-pulse">
                                    🔥 선착순 100명 사은품 15종 증정 중
                                </div>
                                <h1 className="text-5xl md:text-8xl font-black leading-[1.1] mb-10 text-slate-950 tracking-tight">
                                    부담되는 폰값, <br />
                                    <span className="gradient-text">기기값 0원</span> <br />
                                    으로 해결하세요.
                                </h1>
                                <p className="text-xl md:text-2xl text-slate-500 mb-12 font-medium leading-relaxed max-w-2xl">
                                    전국 최대 공시지원금 상향 조정 완료! <br className="hidden md:block" /> 
                                    불필요한 부가서비스 강요 없이, 오직 가격으로만 승부합니다.
                                </p>
                                
                                <div className="flex flex-col sm:flex-row gap-5 justify-center md:justify-start">
                                    <button 
                                        onClick={handleConsultation}
                                        className="bg-slate-950 text-white px-12 py-6 rounded-[2rem] text-xl font-black hover:bg-blue-700 transition-all flex items-center justify-center gap-3 shadow-2xl shadow-slate-300 active:scale-95"
                                    >
                                        최대 혜택 적용받기 <Icon name="chevron-right" />
                                    </button>
                                    <div className="flex flex-col justify-center items-center md:items-start text-sm text-slate-400 font-bold px-4">
                                        <div className="flex items-center gap-1 mb-1">
                                            <Icon name="star" size={14} fill="#fbbf24" className="text-yellow-400"/>
                                            <Icon name="star" size={14} fill="#fbbf24" className="text-yellow-400"/>
                                            <Icon name="star" size={14} fill="#fbbf24" className="text-yellow-400"/>
                                            <Icon name="star" size={14} fill="#fbbf24" className="text-yellow-400"/>
                                            <Icon name="star" size={14} fill="#fbbf24" className="text-yellow-400"/>
                                        </div>
                                        <span>누적 개통 5만 건 돌파</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="md:w-2/5 relative animate-float">
                                <div className="absolute inset-0 bg-blue-400/20 rounded-full blur-[100px] scale-125"></div>
                                <img 
                                    src="https://images.unsplash.com/photo-1616348436168-de43ad0db179?auto=format&fit=crop&q=80&w=800" 
                                    className="relative z-10 w-full max-w-sm mx-auto drop-shadow-[0_50px_50px_rgba(0,0,0,0.15)] rounded-[3.5rem] transform rotate-3"
                                    alt="Latest Phone"
                                />
                                <div className="absolute top-1/4 -left-10 z-20 bg-white p-5 rounded-[2rem] shadow-2xl border border-slate-100 flex items-center gap-3">
                                    <div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
                                        <Icon name="truck" size={24} />
                                    </div>
                                    <div className="pr-2">
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Delivery</p>
                                        <p className="text-sm font-black">당일 전국 퀵배송</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Features Section */}
                    <section id="features" className="py-32 bg-slate-50">
                        <div className="container mx-auto px-6 text-center">
                            <span className="text-blue-600 font-black uppercase tracking-[0.2em] mb-4 block">Why Us</span>
                            <h2 className="text-4xl md:text-6xl font-black mb-20 text-slate-900 tracking-tight">똑똑한 고객님이 노바를 <br/> 선택하는 3가지 이유</h2>
                            <div className="grid md:grid-cols-3 gap-10">
                                <FeatureCard 
                                    icon="shield-check" 
                                    title="투명한 가격 정책" 
                                    desc="현란한 말솜씨로 속이지 않습니다. 공시지원금과 추가 할인을 서류로 직접 증명합니다." 
                                />
                                <FeatureCard 
                                    icon="credit-card" 
                                    title="전무후무 중복 할인" 
                                    desc="통신사 기본 할인에 노바만의 단독 보조금을 더해 실구매가를 파격적으로 낮춥니다." 
                                />
                                <FeatureCard 
                                    icon="zap" 
                                    title="기다림 없는 개통" 
                                    desc="전국 최대 물량 확보로 품귀 현상인 기종까지 신청 당일 즉시 개통하여 보내드립니다." 
                                />
                            </div>
                        </div>
                    </section>

                    {/* Price Preview Section */}
                    <section id="price" className="py-32">
                        <div className="container mx-auto px-6">
                            <div className="bg-slate-950 text-white rounded-[4rem] p-12 md:p-24 shadow-3xl flex flex-col lg:flex-row items-center gap-20">
                                <div className="lg:w-1/2">
                                    <h2 className="text-4xl md:text-6xl font-black mb-10 leading-tight">
                                        타사와 꼭 <br/> <span className="text-blue-500">가격을 비교</span>하세요.
                                    </h2>
                                    <div className="space-y-10">
                                        <div className="flex flex-col gap-3">
                                            <div className="flex justify-between items-end">
                                                <span className="text-slate-500 font-bold text-lg">타사 대리점 평균가</span>
                                                <span className="text-slate-400 line-through text-xl">1,350,000원</span>
                                            </div>
                                            <div className="w-full h-3 bg-slate-800 rounded-full overflow-hidden">
                                                <div className="h-full bg-slate-700 w-full"></div>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-3">
                                            <div className="flex justify-between items-end">
                                                <span className="text-blue-400 font-black text-xl">노바 모바일 혜택가</span>
                                                <span className="text-5xl font-black">0원~</span>
                                            </div>
                                            <div className="w-full h-5 bg-slate-800 rounded-full overflow-hidden p-1 border border-blue-900/50">
                                                <div className="h-full bg-blue-500 w-[10%] rounded-full shadow-[0_0_20px_rgba(59,130,246,0.6)]"></div>
                                            </div>
                                        </div>
                                    </div>
                                    <p className="mt-12 text-slate-500 font-medium">
                                        * 공시지원금 최대치 + 유통망 보조금 + 제휴 혜택 적용 시 기준입니다. <br/>
                                        고객님의 현재 상황에 맞는 최적의 견적을 바로 산출해 드립니다.
                                    </p>
                                </div>
                                <div className="lg:w-1/2 w-full grid grid-cols-1 gap-6">
                                    <PriceRow 
                                        model="Nova 15 Pro" 
                                        price="0원" 
                                        isHot={true} 
                                        image="https://images.unsplash.com/photo-1616348436168-de43ad0db179?auto=format&fit=crop&q=80&w=200"
                                        onClick={handleConsultation}
                                    />
                                    <PriceRow 
                                        model="Nova 15 Lite" 
                                        price="마이너스폰" 
                                        isHot={false} 
                                        image="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&q=80&w=200"
                                        onClick={handleConsultation}
                                    />
                                    <PriceRow 
                                        model="Nova Fold 6" 
                                        price="최대지원" 
                                        isHot={false} 
                                        image="https://images.unsplash.com/photo-1556656793-062ff9878273?auto=format&fit=crop&q=80&w=200"
                                        onClick={handleConsultation}
                                    />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Consultation Section */}
                    <section id="consultation" className="py-32 bg-blue-600">
                        <div className="container mx-auto px-6">
                            <div className="max-w-6xl mx-auto bg-white rounded-[4rem] overflow-hidden shadow-[0_50px_100px_-20px_rgba(0,0,0,0.3)] flex flex-col lg:flex-row">
                                <div className="lg:w-1/2 p-12 md:p-24 bg-slate-900 text-white flex flex-col justify-center">
                                    <h2 className="text-4xl md:text-5xl font-black mb-10 leading-tight">
                                        5초 신청으로 <br/> <span className="text-blue-500">인생 최저가</span>를 <br /> 확인하세요.
                                    </h2>
                                    <ul className="space-y-6">
                                        <li className="flex items-center gap-4 text-slate-300 font-bold text-lg">
                                            <Icon name="check-circle" className="text-blue-500" /> 실시간 재고 선점
                                        </li>
                                        <li className="flex items-center gap-4 text-slate-300 font-bold text-lg">
                                            <Icon name="check-circle" className="text-blue-500" /> 1:1 전담 통신 설계사 매칭
                                        </li>
                                        <li className="flex items-center gap-4 text-slate-300 font-bold text-lg">
                                            <Icon name="check-circle" className="text-blue-500" /> 기존 폰 최고가 보상 안내
                                        </li>
                                    </ul>
                                    <div className="mt-16 p-8 bg-slate-800 rounded-3xl flex items-center gap-6 border border-slate-700">
                                        <div className="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center font-black text-2xl">?</div>
                                        <div>
                                            <p className="text-slate-400 font-bold text-sm">전화 상담 바로가기</p>
                                            <p className="text-2xl font-black">1588-0000</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="lg:w-1/2 p-12 md:p-24">
                                    <form onSubmit={handleSubmit} className="space-y-8">
                                        <div className="space-y-2">
                                            <label className="text-sm font-black text-slate-400 px-1 uppercase tracking-widest">Name</label>
                                            <input type="text" name="name" value={formData.name} onChange={handleChange} required placeholder="성함" className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-6 py-5 outline-none font-bold transition-all text-lg"/>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-sm font-black text-slate-400 px-1 uppercase tracking-widest">Phone</label>
                                            <input type="tel" name="phone" value={formData.phone} onChange={handleChange} required placeholder="연락처 (010-0000-0000)" className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-6 py-5 outline-none font-bold transition-all text-lg"/>
                                        </div>
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2">
                                                <label className="text-sm font-black text-slate-400 px-1 uppercase tracking-widest">Model</label>
                                                <select name="model" value={formData.model} onChange={handleChange} className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-5 outline-none font-bold transition-all text-lg appearance-none cursor-pointer">
                                                    <option>Nova 15 Pro</option>
                                                    <option>Nova 15 Lite</option>
                                                    <option>Nova Fold 6</option>
                                                </select>
                                            </div>
                                            <div className="space-y-2">
                                                <label className="text-sm font-black text-slate-400 px-1 uppercase tracking-widest">Type</label>
                                                <select name="type" value={formData.type} onChange={handleChange} className="w-full bg-slate-50 border-2 border-transparent focus:border-blue-500 rounded-2xl px-5 py-5 outline-none font-bold transition-all text-lg appearance-none cursor-pointer">
                                                    <option>번호이동</option>
                                                    <option>기기변경</option>
                                                    <option>신규가입</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button type="submit" className="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-2xl hover:bg-blue-700 transition-all shadow-2xl shadow-blue-200 mt-4 active:scale-95">
                                            지금 최대 할인금액 확인
                                        </button>
                                        <div className="flex items-center gap-2 justify-center text-xs text-slate-400 font-bold">
                                            <Icon name="shield-check" size={14} /> 개인정보는 오직 상담용으로만 안전하게 사용됩니다.
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer id="reviews" className="bg-slate-50 py-24 border-t border-slate-200">
                        <div className="container mx-auto px-6 text-center">
                            <div className="flex items-center justify-center gap-2 text-3xl font-black text-blue-600 mb-8 tracking-tighter">
                                <Icon name="smartphone" strokeWidth={3} />
                                <span>NOVA MOBILE</span>
                            </div>
                            <div className="flex flex-wrap justify-center gap-10 text-slate-500 font-bold mb-12">
                                <a href="#" className="hover:text-blue-600">이용약관</a>
                                <a href="#" className="hover:text-blue-600 text-blue-600">개인정보처리방침</a>
                                <a href="#" className="hover:text-blue-600">통신판매인증번호</a>
                                <a href="#" className="hover:text-blue-600">매장찾기</a>
                            </div>
                            <p className="text-slate-400 text-sm font-medium leading-relaxed max-w-2xl mx-auto">
                                상호명: (주)노바네트워크 | 대표자: 홍길동 | 사업자등록번호: 123-45-67890 <br/>
                                통신판매업신고: 2024-서울강남-0123호 | 고객센터: 1588-0000 <br/>
                                주소: 서울특별시 강남구 테헤란로 123 노바빌딩 15층
                            </p>
                            <div className="mt-12 pt-12 border-t border-slate-200 text-slate-300 text-xs font-bold">
                                © 2024 Nova Mobile Inc. 모든 혜택은 시장 상황에 따라 변동될 수 있습니다.
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const FeatureCard = ({ icon, title, desc }) => (
            <div className="p-12 rounded-[3rem] bg-white border border-slate-100 shadow-sm hover:shadow-3xl transition-all duration-500 group text-center flex flex-col items-center">
                <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-3xl flex items-center justify-center mb-10 group-hover:bg-blue-600 group-hover:text-white transition-all duration-300 group-hover:rotate-6">
                    <Icon name={icon} size={40} />
                </div>
                <h3 className="text-2xl font-black mb-6 text-slate-900">{title}</h3>
                <p className="text-slate-500 font-medium leading-relaxed">{desc}</p>
            </div>
        );

        const PriceRow = ({ model, price, isHot, image, onClick }) => (
            <div onClick={onClick} className="flex items-center justify-between p-8 rounded-[2.5rem] bg-white/5 border border-white/10 hover:bg-white/10 transition-all group cursor-pointer">
                <div className="flex items-center gap-6">
                    <div className="w-16 h-16 bg-white rounded-2xl flex items-center justify-center overflow-hidden shrink-0">
                        <img src={image} alt={model} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" />
                    </div>
                    <div>
                        <p className="font-black text-xl flex items-center gap-3">
                            {model} 
                            {isHot && <span className="bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full uppercase tracking-widest">Hot</span>}
                        </p>
                        <p className="text-slate-500 font-bold text-sm">전 모델 즉시 개통 가능</p>
                    </div>
                </div>
                <div className="text-right">
                    <p className="text-3xl font-black text-blue-400 group-hover:scale-110 transition-transform">{price}</p>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
